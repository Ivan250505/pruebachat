<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Básico</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 6px; }
    .msg { margin: 6px 0; }
    .user { text-align: right; color: #0066cc; }
    .bot  { text-align: left;  color: #333; }
    #form { display: flex; gap: 8px; }
    #input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Chatbot</h2>
  <div id="chat"></div>
  <form id="form">
    <input id="input" type="text" placeholder="Escribe algo..." autocomplete="off" />
    <button type="submit">Enviar</button>
  </form>

  <script>
    const chat  = document.getElementById('chat');
    const form  = document.getElementById('form');
    const input = document.getElementById('input');

    function addMsg(text, who) {
      const div = document.createElement('div');
      div.className = `msg ${who}`;
      div.textContent = (who === 'user' ? 'Tú: ' : 'Bot: ') + text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      addMsg(msg, 'user');
      input.value = '';

      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      addMsg(data.reply, 'bot');
    });
  </script>
</body>
</html>
